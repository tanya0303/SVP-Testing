<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var pathSegmentsToKeep = 3;
        var locationRef = window.location;
        var pathname = locationRef.pathname;
        var basePath = pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/');
        var routePath = pathname.slice(basePath.length);

        locationRef.replace(
          locationRef.protocol +
            '//' +
            locationRef.hostname +
            (locationRef.port ? ':' + locationRef.port : '') +
            basePath +
            '/?p=' +
            routePath
              .slice(1)
              .replace(/&/g, '~and~') +
            (locationRef.search ? '&' + locationRef.search.slice(1).replace(/&/g, '~and~') : '') +
            locationRef.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
