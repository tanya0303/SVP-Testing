<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Simple 404 redirect for GitHub Pages
      (function() {
        var path = window.location.pathname;
        var repo = '/salesforce-planning-app/';
        
        // If we're not at the repo root
        if (path !== repo && path !== repo.slice(0, -1)) {
          // Redirect to index.html with the path encoded in the URL
          var pathAfterRepo = path.replace(repo, '');
          window.location.replace(
            window.location.origin + 
            repo + 
            '?p=/' + 
            pathAfterRepo +
            window.location.search.slice(1).replace(/&/g, '~') +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body></body>
</html>
